<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>GitHub Issues Tracker</title>
  <script src="https://cdn.tailwindcss.com"></script>

  <style>
    .spinner {
      border-top-color: transparent;
    }

    .modal {
      background-color: #00000080;
    }
  </style>
</head>

<body class="bg-gray-50">
  <nav class="bg-white shadow-sm">
    <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 py-4 flex justify-between items-center">
      <div class="flex items-center gap-2">
        <img class="w-10" src="assets/github-logo.png" alt="">
        <span class="text-xl font-bold text-gray-800">GitHub Issues Tracker</span>
      </div>
      <div class="flex gap-2">
        <input type="text" id="searchInput" placeholder="Search issues..."
          class="px-4 py-2 border border-gray-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-500">
        <button id="searchBtn" class="bg-blue-600 text-white px-4 py-2 rounded-lg hover:bg-blue-700">Search</button>
      </div>
    </div>
  </nav>
  <main class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 py-8">
    <div class="flex justify-between items-center mb-6">
      <div class="flex items-center gap-2">
        <img src="assets/Aperture.png" alt="">
        <span class="text-lg font-semibold text-gray-800" id="issueCount">0 Issues</span>
      </div>
      <div class="flex gap-4">
        <span class="flex items-center gap-1"><span class="w-3 h-3 bg-green-500 rounded-full"></span> <span
            class="text-gray-600">Open: <span id="openCount">0</span></span></span>
        <span class="flex items-center gap-1"><span class="w-3 h-3 bg-purple-500 rounded-full"></span> <span
            class="text-gray-600">Closed: <span id="closedCount">0</span></span></span>
      </div>
    </div>
    <div class="flex gap-4 border-b border-gray-200 mb-6">
      <button class="tab px-4 py-2 font-medium text-gray-600 hover:text-blue-600" data-status="all">All</button>
      <button class="tab px-4 py-2 font-medium text-gray-600 hover:text-blue-600" data-status="open">Open</button>
      <button class="tab px-4 py-2 font-medium text-gray-600 hover:text-blue-600" data-status="closed">Closed</button>
    </div>
    <div id="spinner" class="hidden flex justify-center my-8">
      <div class="spinner w-10 h-10 border-4 border-blue-500 border-t-transparent rounded-full animate-spin">
      </div>
    </div>
    <div id="cardsContainer" class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-4 gap-6"></div>
  </main>
  <div id="modal" class="hidden fixed inset-0 modal flex items-center justify-center p-4">
    <div class="bg-white rounded-lg max-w-lg w-full max-h-[90vh] overflow-y-auto p-6">
      <div class="flex justify-end">
        <button class="close-btn text-gray-500 hover:text-gray-700 text-2xl">&times;</button>
      </div>
      <div id="modalBody"></div>
    </div>
  </div>
  <script src="script/dashboard.js"></script>
</body>

</html>
