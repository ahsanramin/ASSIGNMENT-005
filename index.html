<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>GitHub Issues Tracker - Login</title>
  <script src="https://cdn.tailwindcss.com"></script>

</head>

<body class="bg-gray-100 flex items-center justify-center min-h-screen">
  <div class="bg-white p-8 rounded-lg shadow-lg w-full max-w-md">
    <div class="flex items-center justify-center gap-2 mb-2">
      <img class="w-10" src="assets/github-logo.png" alt="">
      <h1 class="text-2xl font-bold text-gray-800">GitHub Issues Tracker</h1>
    </div>
    <p class="text-gray-500 text-center mt-2">Sign in to manage your issues</p>
    <form id="loginForm" class="mt-6">
      <div class="mb-4">
        <label class="block text-sm font-medium text-gray-700">Username</label>
        <input type="text" id="username" value="admin"
          class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-500"
          required>
        <p class="text-xs text-gray-400 mt-1">Default admin</p>
      </div>
      <div class="mb-6">
        <label class="block text-sm font-medium text-gray-700">Password</label>
        <input type="password" id="password" placeholder="Enter Password"
          class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-500"
          required>
        <p class="text-xs text-gray-400 mt-1">Default admin123</p>
      </div>
      <button type="submit" class="w-full bg-blue-600 text-white py-2 rounded-lg hover:bg-blue-700 transition">Sign
        In</button>
    </form>
    <div class="relative my-6">
      <div class="absolute inset-0 flex items-center">
        <div class="w-full border-t border-gray-300"></div>
      </div>
      <div class="relative flex justify-center text-sm">
        <span class="px-2 bg-white text-gray-500">OR</span>
      </div>
    </div>
    <div class="bg-gray-50 p-4 rounded-lg">
      <p class="text-sm font-medium text-gray-700">Demo Credentials:</p>
      <p class="text-sm text-gray-600">Username: admin</p>
      <p class="text-sm text-gray-600">Password: admin123</p>
    </div>
  </div>
  <script src="script/login.js"></script>
</body>

</html>
